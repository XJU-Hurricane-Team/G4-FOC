version: "4.1"
name: g4-foc
type: ARM
deviceName: STM32G431CBUx
packDir: .pack/Keil/STM32G4xx_DFP.2.2.0
srcDirs:
  - Core/Src
  - Drivers/STM32G4xx_HAL_Driver/Src
  - User/Application/Src
virtualFolder:
  name: <virtual_root>
  files:
    - path: Core/Startup/startup_stm32g431cbux.s
  folders:
    - name: Middleware
      files: []
      folders:
        - name: FreeRTOS
          files:
            - path: Middleware/FreeRTOS/croutine.c
            - path: Middleware/FreeRTOS/event_groups.c
            - path: Middleware/FreeRTOS/list.c
            - path: Middleware/FreeRTOS/queue.c
            - path: Middleware/FreeRTOS/stream_buffer.c
            - path: Middleware/FreeRTOS/tasks.c
            - path: Middleware/FreeRTOS/timers.c
          folders:
            - name: portable
              files:
                - path: Middleware/FreeRTOS/portable/GCC/ARM_CM4F/port.c
                - path: Middleware/FreeRTOS/portable/MemMang/heap_4.c
              folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: 7c729f96734c050c8b9156c8ddf129ee
targets:
  Debug:
    cppPreprocessAttrs:
      defineList:
        - STM32G431xx
        - USE_HAL_DRIVER
        - USE_FULL_LL_DRIVER
      incList:
        - Core/Inc
        - Drivers/CMSIS/Device/ST/STM32G4xx/Include
        - Drivers/CMSIS/Include
        - Drivers/STM32G4xx_HAL_Driver/Inc
        - Middleware/FreeRTOS/include
        - Middleware/FreeRTOS/portable/GCC/ARM_CM4F
        - User/Application/Inc
        - Drivers/Bsp
      libList: []
    excludeList: []
    toolchain: GCC
    toolchainConfigMap:
      GCC:
        archExtensions: ""
        cpuType: Cortex-M4
        floatingPointHardware: single
        options:
          version: 5
          afterBuildTasks: []
          asm-compiler: {}
          beforeBuildTasks: []
          c/cpp-compiler:
            language-c: c11
            language-cpp: c++11
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-debug
            warnings: all-warnings
          global:
            $float-abi-type: hard
            arm-thumb-mode: thumb
            not-use-syscalls: true
            output-debug-info: enable
            use-newlib-nano: true
          linker:
            $outputTaskExcludes:
              - .bin
            $toolName: auto
            LIB_FLAGS: -lm
            output-format: elf
            remove-unused-input-sections: true
            use-float-printf: true
        scatterFilePath: STM32G431CBUX_FLASH.ld
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: STM32G431CB
          vendor: ST
        otherCmds: ""
        proType: 1
        speed: 8000
    uploader: JLink
