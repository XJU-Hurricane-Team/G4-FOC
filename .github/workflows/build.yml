name: Build CI

on: [push, pull_request]

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install make cmake unzip

      - name: Download Toolchains
        run: |
          wget https://github.com/xpack-dev-tools/arm-none-eabi-gcc-xpack/releases/download/v15.2.1-1.1/xpack-arm-none-eabi-gcc-15.2.1-1.1-linux-x64.tar.gz
          tar zxvf xpack-arm-none-eabi-gcc-15.2.1-1.1-linux-x64.tar.gz
          echo "$(pwd)/xpack-arm-none-eabi-gcc-15.2.1-1.1/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-release
          path: |
            build/*.elf
            build/*.hex
            build/*.bin
          retention-days: 7